services:
  wiremock:
    image: holomekc/wiremock-gui:latest
    restart: unless-stopped
    environment:
      # Coolify magic env vars — assign domains in the Coolify UI and they populate at deploy time.
      # API on internal port 8089, GUI on internal port 8080.
      - SERVICE_FQDN_WIREMOCK_8089
      - SERVICE_FQDN_WIREMOCK_8080
    expose:
      - "8089"
      - "8080"
    volumes:
      - ./wiremock:/home/wiremock
    command: --port 8089 --global-response-templating --verbose --max-request-journal 1000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8089/__admin/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    environment:
      # Web UI gets a public domain via Coolify; SMTP (1025) is intentionally NOT exposed publicly.
      - SERVICE_FQDN_MAILHOG_8025
    expose:
      - "1025"
      - "8025"